<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1 Million Checkboxes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            background: #0a0a0f;
            background-image:
                radial-gradient(ellipse at 20% 0%, rgba(88, 28, 135, 0.25) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 100%, rgba(15, 118, 110, 0.2) 0%, transparent 60%);
            color: #e2e8f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 3rem 1.5rem;
            overflow-x: hidden;
        }

        h1 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 800;
            text-align: center;
            margin-bottom: 0.4rem;
            background: linear-gradient(135deg, #a78bfa, #6ee7b7, #38bdf8);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 4s ease-in-out infinite;
            letter-spacing: -0.02em;
        }

        @keyframes shimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .subtitle {
            font-size: 1rem;
            color: #94a3b8;
            margin-bottom: 2.5rem;
            text-align: center;
            font-weight: 400;
        }

        .counter {
            font-size: 0.95rem;
            color: #6ee7b7;
            background: rgba(110, 231, 183, 0.08);
            border: 1px solid rgba(110, 231, 183, 0.15);
            padding: 0.5rem 1.5rem;
            border-radius: 999px;
            margin-bottom: 2rem;
            font-weight: 600;
            letter-spacing: 0.03em;
            transition: all 0.3s ease;
        }

        #container {
            display: grid;
            grid-template-columns: repeat(auto-fill, 38px);
            gap: 6px;
            justify-content: center;
            max-width: 720px;
            width: 100%;
            padding: 2rem;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            box-shadow:
                0 0 60px rgba(88, 28, 135, 0.08),
                0 4px 30px rgba(0, 0, 0, 0.3);
        }

        /* Custom Checkbox Styles */
        #container input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 30px;
            height: 30px;
            border: 2px solid rgba(148, 163, 184, 0.2);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.03);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        #container input[type="checkbox"]:hover {
            border-color: rgba(167, 139, 250, 0.5);
            background: rgba(167, 139, 250, 0.08);
            transform: scale(1.15);
            box-shadow: 0 0 12px rgba(167, 139, 250, 0.2);
        }

        #container input[type="checkbox"]:checked {
            background: linear-gradient(135deg, #7c3aed, #2dd4bf);
            border-color: transparent;
            box-shadow: 0 0 14px rgba(124, 58, 237, 0.35);
            animation: pop 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #container input[type="checkbox"]:checked::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 16px;
            font-weight: 800;
            line-height: 1;
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.25); }
            100% { transform: scale(1); }
        }

        #container input[type="checkbox"]:active {
            transform: scale(0.92);
        }

        /* Footer */
        .footer {
            margin-top: 3rem;
            font-size: 0.8rem;
            color: #475569;
        }

        /* Toast Notification */
        .toast-container {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            pointer-events: none;
        }

        .toast {
            pointer-events: auto;
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            min-width: 320px;
            max-width: 420px;
            padding: 1rem 1.25rem;
            background: rgba(30, 20, 40, 0.92);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(248, 113, 113, 0.25);
            border-left: 4px solid #f87171;
            border-radius: 12px;
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.4),
                0 0 20px rgba(248, 113, 113, 0.1);
            color: #fecaca;
            font-size: 0.9rem;
            line-height: 1.5;
            animation: toast-slide-in 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            overflow: hidden;
            position: relative;
        }

        .toast.toast-exit {
            animation: toast-slide-out 0.35s cubic-bezier(0.4, 0, 1, 1) forwards;
        }

        .toast-icon {
            flex-shrink: 0;
            width: 22px;
            height: 22px;
            background: rgba(248, 113, 113, 0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            margin-top: 1px;
        }

        .toast-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.15rem;
        }

        .toast-title {
            font-weight: 600;
            color: #f87171;
            font-size: 0.85rem;
            letter-spacing: 0.02em;
        }

        .toast-message {
            color: #e2e0e8;
            word-break: break-word;
        }

        .toast-close {
            flex-shrink: 0;
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-size: 1.1rem;
            padding: 2px 4px;
            border-radius: 6px;
            transition: all 0.2s ease;
            line-height: 1;
        }

        .toast-close:hover {
            color: #f87171;
            background: rgba(248, 113, 113, 0.1);
        }

        .toast-progress {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            background: linear-gradient(90deg, #f87171, #fb923c);
            border-radius: 0 0 0 12px;
            animation: toast-progress 5s linear forwards;
        }

        @keyframes toast-slide-in {
            from {
                opacity: 0;
                transform: translateX(100%) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateX(0) scale(1);
            }
        }

        @keyframes toast-slide-out {
            from {
                opacity: 1;
                transform: translateX(0) scale(1);
            }
            to {
                opacity: 0;
                transform: translateX(100%) scale(0.95);
            }
        }

        @keyframes toast-progress {
            from { width: 100%; }
            to { width: 0%; }
        }

        @media (max-width: 480px) {
            #container {
                grid-template-columns: repeat(auto-fill, 34px);
                gap: 5px;
                padding: 1.2rem;
            }
            #container input[type="checkbox"] {
                width: 26px;
                height: 26px;
                border-radius: 6px;
            }
            .toast-container {
                top: 1rem;
                right: 1rem;
                left: 1rem;
            }
            .toast {
                min-width: unset;
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <h1>1 Million Checkboxes</h1>
    <p class="subtitle">Click. Check. Conquer. ✨</p>
    <div class="toast-container" id="toast-container"></div>
    <div id="container"></div>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const scoket = io();
        const container = document.getElementById('container')
        const CHECKBOX_COUNT = 100

        function showErrorToast(message) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `
                <span class="toast-icon">⚠</span>
                <div class="toast-body">
                    <span class="toast-title">Error</span>
                    <span class="toast-message">${message}</span>
                </div>
                <button class="toast-close" onclick="dismissToast(this.parentElement)">✕</button>
                <div class="toast-progress"></div>
            `;
            container.appendChild(toast);
            setTimeout(() => dismissToast(toast), 5000);
        }

        function dismissToast(toast) {
            if (!toast || toast.classList.contains('toast-exit')) return;
            toast.classList.add('toast-exit');
            toast.addEventListener('animationend', () => toast.remove());
        }

        scoket.on('server:error', (data)=>{
            const errorMessage = data.error;
            showErrorToast(errorMessage);
        })
        scoket.on('server:checkbox:change', (data)=>{
            console.log(`Socket server Event`, data);
            const {index , checked } = data;

            const input = document.getElementById(`checkbox-${index}`)
            if(input){
                input.checked = checked
            }
        });

        async function fetchStateFromServer() {
            while(container.firstChild){
                container.removeChild(container.firstChild)
            }
            
            const response = await fetch('/checkboxes', {method: 'GET'})
            const data = await response.json();
            if(data && data.checkboxes){
                data.checkboxes.forEach((serverValue, index) =>{
                    const input = document.createElement('input');

                    input.type = 'checkbox';
                    input.id = `checkbox-${index}`
                    input.checked = serverValue;

                    input.addEventListener('change', event =>{
                        const checked = event.target.checked
                        console.log('Checkbox chnages', {index, checked})
                        scoket.emit('client:checkbox:change',{index, checked});
                        fetchStateFromServer();
                    });
                    container.appendChild(input)
                });
            }
        }

        window.addEventListener('load', async() => {
          fetchStateFromServer();
        });
    </script>
</body>
</html>
